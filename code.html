<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Module 3 Solution</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

  <style>
    /* Tall section */
    .main-section {
      background-color: #f2f2f2;
      height: 1000px;
      padding: 20px;
    }

    /* Mobile dropdown full width background */
    .navbar-nav {
      background-color: #dddddd;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-default">
  <div class="container-fluid">

    <div class="navbar-header">

      <!-- Mobile Toggle Button -->
      <button type="button"
              class="navbar-toggle collapsed"
              data-toggle="collapse"
              data-target="#collapsable-nav">

        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>

      <!-- Brand -->
      <a class="navbar-brand" href="#">Food, LLC</a>
    </div>

    <!-- Mobile Menu -->
    <div id="collapsable-nav" class="collapse navbar-collapse">
      <ul class="nav navbar-nav visible-xs text-center">
        <li><a href="#">Chicken</a></li>
        <li><a href="#">Beef</a></li>
        <li><a href="#">Sushi</a></li>
      </ul>
    </div>

  </div>
</nav>

<!-- Page Heading -->
<div class="container">
  <h1 class="text-center">Our Menu</h1>
</div>

<!-- Tall Section -->
<div class="container-fluid">
  <div class="row">
    <div class="col-xs-12 main-section">
      <p>
        This is a tall section for the Module 3 assignment.
        Scroll down to see the navbar disappear while scrolling.
      </p>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

</body>
</html>
